{% extends "base.html" %}

{% block title %}用户管理 - 客户管理系统{% endblock %}

{% block content %}
<div class="content-header">
    <h4 class="mb-0"><i class="bi bi-people me-2"></i>用户管理</h4>
</div>

<div class="table-card">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>权限</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 修改角色弹窗 -->
<div class="modal fade" id="roleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">修改角色</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="mb-3">
                    <label class="form-label">用户：<strong id="editUserName"></strong></label>
                </div>
                <div class="mb-3">
                    <label class="form-label">选择角色（可多选）</label>
                    <select class="form-select" id="editRoleSelect" multiple style="height: 150px;">
                    </select>
                    <small class="text-muted">用户的权限为所选角色权限的合并</small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUserRoles()">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
let rolesData = [];

$(document).ready(function() {
    loadRoles();
    loadData();
});

function loadRoles() {
    $.get('/api/roles', function(res) {
        if (res.code === 0) {
            rolesData = res.data;
            const editSelect = $('#editRoleSelect');
            const hasSuperAdmin = res.has_super_admin;
            
            rolesData.forEach(role => {
                // 如果已有超级管理员，禁用超级管理员角色选项
                if (hasSuperAdmin && role.is_super_admin) {
                    editSelect.append(`<option value="${role.id}" disabled>${role.role_name} (已存在)</option>`);
                } else {
                    editSelect.append(`<option value="${role.id}">${role.role_name}</option>`);
                }
            });
            
            // 如果已有超级管理员，显示提示
            if (hasSuperAdmin) {
                $('.modal-body').first().prepend('<div class="alert alert-warning py-1 px-2 mb-2" style="font-size:0.85rem;">系统已有超级管理员，其他用户无法设置为超级管理员</div>');
            }
        }
    });
}

function loadData() {
    $.get('/api/users', function(res) {
        if (res.code === 0) {
            renderTable(res.data);
        }
    });
}

function renderTable(data) {
    const tbody = $('#tableBody');
    if (data.length === 0) {
        tbody.html('<tr><td colspan="8" class="text-center text-muted py-4">暂无数据</td></tr>');
        return;
    }
    
    let html = '';
    data.forEach(item => {
        const isEnabled = item.status === 1;
        const statusBadge = isEnabled 
            ? '<span class="badge bg-success">启用</span>' 
            : '<span class="badge bg-secondary">停用</span>';
        
        const roleNames = item.role_names ? item.role_names.split(',').map((role, idx) => {
            const colors = ['bg-primary', 'bg-success', 'bg-warning', 'bg-info', 'bg-danger', 'bg-secondary'];
            const color = colors[idx % colors.length];
            return `<span class="badge ${color} me-1">${role.trim()}</span>`;
        }).join('') : '<span class="text-muted">无角色</span>';
        const permCount = (item.permissions || []).length;
        
        // 超级管理员隐藏操作按钮
        const isSuperAdmin = item.is_super_admin;
        const actionButtons = isSuperAdmin ? '<span class="text-muted"><i class="bi bi-shield-fill-check"></i> 超级管理员</span>' : `
            <button class="btn btn-sm ${isEnabled ? 'btn-outline-warning' : 'btn-outline-success'} me-1" 
                    onclick="toggleStatus(${item.id}, ${isEnabled ? 0 : 1})" 
                    title="${isEnabled ? '停用' : '启用'}">
                <i class="bi bi${isEnabled ? '-pause-circle' : '-play-circle'}"></i>
            </button>
            <button class="btn btn-sm btn-outline-info me-1" onclick="resetPassword(${item.id})" title="重置密码">
                <i class="bi bi-key"></i>
            </button>
            <button class="btn btn-sm btn-outline-primary" onclick="showEditRoleModal(${item.id}, '${item.username}', '${item.role_ids || ''}')" title="修改角色">
                <i class="bi bi-shield-lock"></i>
            </button>
        `;
        
        html += `<tr>
            <td>${item.id}</td>
            <td><strong>${item.name || ''}</strong></td>
            <td>${item.username}</td>
            <td>${roleNames}</td>
            <td><small class="text-muted">${permCount}个权限</small></td>
            <td>${statusBadge}</td>
            <td>${item.created_at || ''}</td>
            <td>${actionButtons}</td>
        </tr>`;
    });
    tbody.html(html);
}

function toggleStatus(userId, newStatus) {
    const action = newStatus === 1 ? '启用' : '停用';
    swalConfirm(`确定要${action}该用户吗？`).then((result) => {
        if (!result.isConfirmed) return;
    
        $.ajax({
            url: `/api/users/edit/${userId}`,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ status: newStatus }),
            success: function(res) {
                if (res.code === 0) {
                    loadData();
                    swalSuccess(`${action}成功`);
                } else {
                    swalError(res.msg);
                }
            }
        });
    });
}

function resetPassword(userId) {
    swalConfirm('确定要重置该用户密码吗？重置后密码将显示在下方。').then((result) => {
        if (!result.isConfirmed) return;
    
        $.ajax({
            url: `/api/users/reset_password/${userId}`,
            type: 'POST',
            success: function(res) {
                if (res.code === 0) {
                    swalSuccess(`密码重置成功！\n\n新密码：${res.password}\n\n请告知用户妥善保管！`);
                    loadData();
                } else {
                    swalError(res.msg);
                }
            }
        });
    });
}

function showEditRoleModal(userId, username, roleIds) {
    $('#editUserId').val(userId);
    $('#editUserName').text(username);
    
    // 设置已选中的角色
    const currentRoleIds = roleIds ? roleIds.split(',') : [];
    $('#editRoleSelect').val(currentRoleIds);
    
    $('#roleModal').modal('show');
}

function saveUserRoles() {
    const userId = $('#editUserId').val();
    const roleIds = $('#editRoleSelect').val() || [];
    
    $.ajax({
        url: `/api/users/edit/${userId}`,
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ role_ids: roleIds }),
        success: function(res) {
            if (res.code === 0) {
                $('#roleModal').modal('hide');
                loadData();
                swalSuccess('角色修改成功');
            } else {
                swalError(res.msg);
            }
        }
    });
}
</script>
{% endblock %}
