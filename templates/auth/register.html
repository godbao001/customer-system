<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 客户管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 400px; width: 100%; padding: 40px; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0.2rem rgba 0 0(102,126,234,0.25); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shop" style="font-size: 3rem; color: #667eea;"></i>
            <h4 class="mt-3">用户注册</h4>
            <p class="text-muted">注册后没有权限，请联系管理员分配角色</p>
        </div>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">姓名 <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" class="form-control" id="name" placeholder="请输入姓名" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名(2-20字符)" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码(至少6位)" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">确认密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">注 册</button>
            </div>
        </form>
        
        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none">已有账号？立即登录</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        // 验证中文姓名（2-10个汉字）
        function validateName(name) {
            return /^[\u4e00-\u9fa5]{2,10}$/.test(name);
        }
        
        // 验证用户名（字母、数字、下划线，3-20字符，不能以数字开头）
        function validateUsername(username) {
            return /^[a-zA-Z_][a-zA-Z0-9_]{2,19}$/.test(username);
        }
        
        function clearValidation(input) {
            input.removeClass('is-invalid');
            input.next('.invalid-feedback').remove();
        }
        
        $('#name').on('input', function() {
            clearValidation($(this));
        });
        
        $('#name').on('blur', function() {
            const name = $(this).val().trim();
            if (name && !validateName(name)) {
                $(this).next('.invalid-feedback').remove();
                $(this).addClass('is-invalid');
                $(this).after('<div class="invalid-feedback">姓名必须是2-10个中文汉字</div>');
            } else {
                clearValidation($(this));
            }
        });
        
        $('#username').on('input', function() {
            clearValidation($(this));
        });
        
        $('#username').on('blur', function() {
            const username = $(this).val().trim();
            if (username && !validateUsername(username)) {
                $(this).next('.invalid-feedback').remove();
                $(this).addClass('is-invalid');
                $(this).after('<div class="invalid-feedback">用户名3-20位，字母/数字/下划线，不能以数字开头</div>');
            } else {
                clearValidation($(this));
            }
        });
        
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            
            const name = $('#name').val().trim();
            const username = $('#username').val().trim();
            const password = $('#password').val();
            const confirmPassword = $('#confirmPassword').val();
            
            // 前端验证
            if (!name) {
                alert('请输入姓名');
                return;
            }
            if (!validateName(name)) {
                alert('姓名必须是2-10个中文汉字');
                return;
            }
            
            if (!username) {
                alert('请输入用户名');
                return;
            }
            if (!validateUsername(username)) {
                alert('用户名3-20位，字母/数字/下划线，不能以数字开头');
                return;
            }
            
            if (!password) {
                alert('请输入密码');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6位');
                return;
            }
            if (password !== confirmPassword) {
                alert('两次密码输入不一致');
                return;
            }
            
            $.ajax({
                url: '/api/register',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    name: name,
                    username: username,
                    password: password,
                    confirm_password: confirmPassword
                }),
                success: function(res) {
                    if (res.code === 0) {
                        alert('注册成功！请等待管理员分配权限');
                        location.href = '/login';
                    } else {
                        alert(res.msg);
                    }
                }
            });
        });
    </script>
</body>
</html>
