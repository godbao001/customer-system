{% extends "base.html" %}

{% block title %}停用列表 - 客户管理系统{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0">
        <i class="bi bi-pause-circle me-2"></i>客户管理
    </h4>
    <div>
        <a href="/shop/" class="btn btn-outline-secondary btn-sm me-2">
            <i class="bi bi-list-ul"></i> 客户列表
        </a>
        <span class="badge bg-warning text-dark">停用列表</span>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-2">
        <input type="number" class="form-control" id="searchIdInput" placeholder="输入ID精确搜索">
    </div>
    <div class="col-md-4">
        <div class="input-group">
            <input type="text" class="form-control" id="searchInput" placeholder="搜索：ID/店铺名称/电话/地址/拼音...">
            <button class="btn btn-outline-secondary" onclick="loadData(1)">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </div>
    <div class="col-md-2">
        <button class="btn btn-outline-primary w-100" onclick="searchById()">ID搜索</button>
    </div>
</div>

<div class="table-card">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>店铺名称</th>
                    <th>经营模式</th>
                    <th>电话</th>
                    <th>大区</th>
                    <th>省</th>
                    <th>市</th>
                    <th>区</th>
                    <th>详细地址</th>
                    <th>创建时间</th>
                    <th>更改时间</th>
                    <th>备注</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="p-3">
        <nav>
            <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
        </nav>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    loadData(1);
});

// 加载数据
function loadData(page) {
    const search = document.getElementById('searchInput').value;
    const searchId = document.getElementById('searchIdInput').value;
    
    const params = new URLSearchParams({
        status: 0,
        page: page,
        limit: 12,
        search: search,
        search_id: searchId
    });
    
    fetch(`/shop/api/list?${params}`)
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                renderTable(data.data);
                renderPagination(data.count, page);
            }
        });
}

// 搜索ID
function searchById() {
    loadData(1);
}

// 渲染表格
function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="14" class="text-center text-muted py-4">暂无数据</td></tr>';
        return;
    }
    
    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.shop_name || ''}</td>
            <td>${item.business_model || ''}</td>
            <td>${item.phone || ''}</td>
            <td>${item.region || ''}</td>
            <td>${item.province || ''}</td>
            <td>${item.city || ''}</td>
            <td>${item.district || ''}</td>
            <td>${item.address || ''}</td>
            <td>${item.created_at || ''}</td>
            <td>${item.updated_at || ''}</td>
            <td>${item.remark || ''}</td>
            <td>
                <span class="badge bg-secondary">已停用</span>
            </td>
            <td>
                <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditModal(${item.id})">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-success" onclick="toggleStatus(${item.id}, 0)">
                    <i class="bi bi-play-fill"></i> 启用
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// 渲染分页
function renderPagination(total, currentPage) {
    const totalPages = Math.ceil(total / 12);
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';
    
    if (totalPages <= 1) return;
    
    if (currentPage > 1) {
        pagination.innerHTML += `<li class="page-item"><a class="page-link" href="javascript:loadData(${currentPage - 1})">上一页</a></li>`;
    }
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            pagination.innerHTML += `<li class="page-item active"><a class="page-link" href="javascript:void(0)">${i}</a></li>`;
        } else if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            pagination.innerHTML += `<li class="page-item"><a class="page-link" href="javascript:loadData(${i})">${i}</a></li>`;
        }
    }
    
    if (currentPage < totalPages) {
        pagination.innerHTML += `<li class="page-item"><a class="page-link" href="javascript:loadData(${currentPage + 1})">下一页</a></li>`;
    }
}

// 显示编辑弹窗
function showEditModal(id) {
    fetch(`/shop/api/get/${id}`)
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                alert('编辑功能开发中，请到客户列表页面编辑');
                window.location.href = '/shop/';
            }
        });
}

// 切换状态
function toggleStatus(id, status) {
    const action = status === 1 ? '启用' : '停用';
    
    if (confirm(`确定要${action}该客户吗？`)) {
        fetch(`/shop/api/toggle_status/${id}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: status})
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                loadData(1);
            } else {
                alert(data.msg);
            }
        });
    }
}
</script>
{% endblock %}
