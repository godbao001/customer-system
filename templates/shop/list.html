{% extends "base.html" %}

{% block title %}店铺管理 - 客户管理系统{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0"><i class="bi bi-shop me-2"></i>店铺管理</h4>
    <button class="btn btn-primary" onclick="showAddModal()">
        <i class="bi bi-plus-lg me-1"></i> 添加店铺
    </button>
</div>

<div class="row mb-3">
    <div class="col-md-2">
        <select class="form-select" id="statusFilter" onchange="loadData(1)">
            <option value="1" selected>营业中</option>
            <option value="0">已歇业</option>
        </select>
    </div>
    <div class="col-md-2">
        <select class="form-select" id="businessModelFilter" onchange="loadData(1)">
            <option value="">全部</option>
        </select>
    </div>
    <div class="col-md-3">
        <div class="input-group">
            <input type="text" class="form-control" id="searchInput" placeholder="搜索店铺...">
            <button class="btn btn-outline-secondary" onclick="loadData(1)">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </div>
</div>

<div class="table-card">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>店铺名称</th>
                    <th>经营模式</th>
                    <th>联系人</th>
                    <th>电话</th>
                    <th>地址</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="p-3">
        <nav>
            <ul class="pagination justify-content-center mb-0" id="pagination"></ul>
        </nav>
    </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal fade" id="shopModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加店铺</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="shopForm">
                    <input type="hidden" id="shopId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">店铺名称 *</label>
                            <input type="text" class="form-control" id="shopName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">经营模式</label>
                            <select class="form-select" id="businessModel">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">联系人</label>
                            <input type="text" class="form-control" id="contactPerson">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">联系电话</label>
                            <input type="text" class="form-control" id="contactPhone">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">地址</label>
                            <input type="text" class="form-control" id="address">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="remark" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveShop()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;
var pageSize = 12;
var currentStatus = 1;
var businessModelOptions = [];

$(function() {
    currentStatus = parseInt($('#statusFilter').val()) || 1;
    loadBusinessModels();
    loadData(1);
});

function loadBusinessModels() {
    $.get('/system/api/field/list?field_type=business_model', function(res) {
        if (res.code === 0) {
            businessModelOptions = res.data;
            
            var optionsHtml = '<option value="">请选择</option>';
            res.data.forEach(function(item) {
                optionsHtml += '<option value="' + item.field_name + '">' + item.field_name + '</option>';
            });
            $('#businessModel').html(optionsHtml);
            $('#businessModelFilter').html('<option value="">全部</option>' + optionsHtml);
            
            if (res.data.length > 0) {
                var defaultItem = res.data.find(function(item) { return item.is_default === 1; });
                if (defaultItem) {
                    $('#businessModel').val(defaultItem.field_name);
                }
            }
        }
    });
}

function loadData(page) {
    currentPage = page;
    var status = $('#statusFilter').val();
    var businessModel = $('#businessModelFilter').val();
    var search = $('#searchInput').val();
    
    $.get('/shop/api/list', {
        status: status,
        business_model: businessModel,
        search: search,
        page: page,
        limit: pageSize
    }, function(res) {
        if (res.code === 0) {
            renderTable(res.data);
            renderPagination(res.total);
        }
    });
}

function renderTable(data) {
    if (data.length === 0) {
        $('#tableBody').html('<tr><td colspan="8" class="text-center text-muted py-4">暂无数据</td></tr>');
        return;
    }
    
    var html = '';
    data.forEach(function(item) {
        // 获取经营模式对应的颜色
        var modelColor = '';
        var modelName = item.business_model || '';
        if (businessModelOptions && businessModelOptions.length > 0) {
            var opt = businessModelOptions.find(function(x) { return x.field_name === modelName; });
            if (opt && opt.color) {
                modelColor = getModelColor(opt.color);
            }
        }
        var textColor = modelColor ? 'color: #fff;' : '';
        var rowStyle = modelColor ? 'background-color: ' + modelColor + ';' : '';
        
        html += '<tr style="' + rowStyle + '">';
        html += '<td>' + item.id + '</td>';
        html += '<td style="' + textColor + '"><strong>' + item.shop_name + '</strong></td>';
        html += '<td style="' + textColor + '">' + modelName + '</td>';
        html += '<td style="' + textColor + '">' + (item.contact_person || '-') + '</td>';
        html += '<td style="' + textColor + '">' + (item.contact_phone || '-') + '</td>';
        html += '<td style="' + textColor + '">' + (item.address || '-') + '</td>';
        html += '<td>' + (item.status === 1 ? '<span class="badge bg-success">营业中</span>' : '<span class="badge bg-secondary">已歇业</span>') + '</td>';
        html += '<td>';
        html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="createOrder(' + item.id + ', \'' + item.shop_name + '\', \'' + (item.business_model || '') + '\')"><i class="bi bi-cart-plus"></i> 下单</button>';
        html += '<button class="btn btn-sm btn-outline-primary me-1" onclick="editShop(' + item.id + ')"><i class="bi bi-pencil"></i></button>';
        html += '<button class="btn btn-sm btn-outline-danger" onclick="deleteShop(' + item.id + ')"><i class="bi bi-trash"></i></button>';
        html += '</td></tr>';
    });
    $('#tableBody').html(html);
}

function renderPagination(total) {
    var totalPages = Math.ceil(total / pageSize);
    if (totalPages <= 1) {
        $('#pagination').html('');
        return;
    }
    
    var html = '';
    html += '<li class="page-item ' + (currentPage === 1 ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="javascript:void(0)" onclick="loadData(' + (currentPage - 1) + ')">上一页</a></li>';
    
    for (var i = 1; i <= totalPages; i++) {
        html += '<li class="page-item ' + (currentPage === i ? 'active' : '') + '">';
        html += '<a class="page-link" href="javascript:void(0)" onclick="loadData(' + i + ')">' + i + '</a></li>';
    }
    
    html += '<li class="page-item ' + (currentPage === totalPages ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="javascript:void(0)" onclick="loadData(' + (currentPage + 1) + ')">下一页</a></li>';
    
    $('#pagination').html(html);
}

function showAddModal() {
    $('#shopId').val('');
    $('#shopForm')[0].reset();
    loadBusinessModels();
    new bootstrap.Modal($('#shopModal')).show();
}

function editShop(id) {
    $.get('/shop/api/' + id, function(res) {
        if (res.code === 0) {
            var shop = res.data;
            $('#shopId').val(shop.id);
            $('#shopName').val(shop.shop_name);
            $('#businessModel').val(shop.business_model || '');
            $('#contactPerson').val(shop.contact_person || '');
            $('#contactPhone').val(shop.contact_phone || '');
            $('#address').val(shop.address || '');
            $('#remark').val(shop.remark || '');
            $('#modalTitle').text('编辑店铺');
            new bootstrap.Modal($('#shopModal')).show();
        }
    });
}

function saveShop() {
    var id = $('#shopId').val();
    var data = {
        shop_name: $('#shopName').val(),
        business_model: $('#businessModel').val(),
        contact_person: $('#contactPerson').val(),
        contact_phone: $('#contactPhone').val(),
        address: $('#address').val(),
        remark: $('#remark').val(),
        status: 1
    };
    
    var url = id ? '/shop/api/update/' + id : '/shop/api/add';
    var method = id ? 'PUT' : 'POST';
    
    $.ajax({
        url: url,
        type: method,
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(res) {
            if (res.code === 0) {
                $('#shopModal').modal('hide');
                loadData(currentPage);
            } else {
                alert(res.msg);
            }
        }
    });
}

function deleteShop(id) {
    if (!confirm('确定要删除该店铺吗？')) return;
    
    $.ajax({
        url: '/shop/api/delete/' + id,
        type: 'DELETE',
        success: function(res) {
            if (res.code === 0) {
                loadData(currentPage);
            } else {
                alert(res.msg);
            }
        }
    });
}

function createOrder(shopId, shopName, businessModel) {
    window.location.href = '/shop/?backToOrders=' + shopId + '&action=create';
}

function getModelColor(colorClass) {
    var colors = {
        'bg-primary': '#0d6efd',
        'bg-success': '#198754',
        'bg-info': '#0dcaf0',
        'bg-warning': '#ffc107',
        'bg-danger': '#dc3545',
        'bg-purple': '#9b59b6',
        'bg-orange': '#e67e22',
        'bg-cyan': '#17a2b8'
    };
    return colors[colorClass] || '';
}
</script>
{% endblock %}
