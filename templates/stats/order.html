{% extends "base.html" %}

{% block title %}订单统计 - 客户管理系统{% endblock %}

{% block content %}
<div class="content-header">
    <h4><i class="bi bi-cart me-2"></i>订单统计</h4>
</div>

<!-- 统计卡片 -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                        <i class="bi bi-cart text-primary fs-4"></i>
                    </div>
                    <div>
                        <p class="text-muted mb-0">总订单数</p>
                        <h4 class="mb-0" id="totalOrders">-</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                        <i class="bi bi-calendar-check text-success fs-4"></i>
                    </div>
                    <div>
                        <p class="text-muted mb-0">今日订单</p>
                        <h4 class="mb-0" id="todayOrders">-</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                        <i class="bi bi-calendar-month text-warning fs-4"></i>
                    </div>
                    <div>
                        <p class="text-muted mb-0">本月订单</p>
                        <h4 class="mb-0" id="monthOrders">-</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle bg-info bg-opacity-10 p-3 me-3">
                        <i class="bi bi-calendar-range text-info fs-4"></i>
                    </div>
                    <div>
                        <p class="text-muted mb-0">本年订单</p>
                        <h4 class="mb-0" id="yearOrders">-</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 月度统计 -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-white border-0">
        <h5 class="mb-0"><i class="bi bi-calendar3 me-2"></i>月度订单统计（近12个月）</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered" id="monthlyTable">
                <thead class="table-light">
                    <tr>
                        <th>月份</th>
                        <th>订单数</th>
                        <th>环比</th>
                        <th>同比</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 月度图表 -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-white border-0">
        <h5 class="mb-0"><i class="bi bi-graph-up me-2"></i>月度订单趋势（近30个月）</h5>
    </div>
    <div class="card-body">
        <div id="monthChart" style="height: 350px;"></div>
    </div>
</div>

<!-- 年度统计 -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-header bg-white border-0">
        <h5 class="mb-0"><i class="bi bi-calendar-range me-2"></i>年度订单统计（近8年）</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered" id="yearlyTable">
                <thead class="table-light">
                    <tr>
                        <th>年份</th>
                        <th>订单数</th>
                        <th>同比</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="3" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 年度图表 -->
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0">
        <h5 class="mb-0"><i class="bi bi-graph-up me-2"></i>年度订单趋势（近8年）</h5>
    </div>
    <div class="card-body">
        <div id="yearChart" style="height: 350px;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
var monthChart = null;
var yearChart = null;

$(document).ready(function() {
    loadStats();
    loadMonthlyData();
    loadYearlyData();
});

function loadStats() {
    $.get('/stats/api/order/summary', function(res) {
        if (res.code === 0) {
            var data = res.data;
            $('#totalOrders').text(data.total_orders || 0);
            $('#todayOrders').text(data.today_orders || 0);
            $('#monthOrders').text(data.month_orders || 0);
            $('#yearOrders').text(data.year_orders || 0);
        }
    });
}

function loadMonthlyData() {
    $.get('/stats/api/order/monthly', function(res) {
        if (res.code === 0) {
            renderMonthlyTable(res.data_12 || []);
            renderMonthChart(res.data_30 || []);
        }
    });
}

function loadYearlyData() {
    $.get('/stats/api/order/yearly', function(res) {
        if (res.code === 0) {
            renderYearlyTable(res.data || []);
            renderYearChart(res.data || []);
        }
    });
}

function formatPct(val) {
    if (val === undefined || val === null) return '-';
    if (val > 0) return '<span class="text-success">↑ ' + val + '%</span>';
    if (val < 0) return '<span class="text-danger">↓ ' + Math.abs(val) + '%</span>';
    return '<span class="text-muted">- 0%</span>';
}

function renderMonthlyTable(data) {
    var tbody = $('#monthlyTable tbody');
    if (!data || data.length === 0) {
        tbody.html('<tr><td colspan="4" class="text-center text-muted">暂无数据</td></tr>');
        return;
    }
    
    var html = '';
    data.reverse().forEach(function(item) {
        html += '<tr>';
        html += '<td>' + item.year + '年' + item.month + '月</td>';
        html += '<td><strong>' + item.count + '</strong></td>';
        html += '<td>' + formatPct(item.环比) + '</td>';
        html += '<td>' + formatPct(item.同比) + '</td>';
        html += '</tr>';
    });
    
    tbody.html(html);
}

function renderYearlyTable(data) {
    var tbody = $('#yearlyTable tbody');
    if (!data || data.length === 0) {
        tbody.html('<tr><td colspan="3" class="text-center text-muted">暂无数据</td></tr>');
        return;
    }
    
    var html = '';
    data.reverse().forEach(function(item) {
        html += '<tr>';
        html += '<td>' + item.year + '年</td>';
        html += '<td><strong>' + item.count + '</strong></td>';
        html += '<td>' + formatPct(item.同比) + '</td>';
        html += '</tr>';
    });
    
    tbody.html(html);
}

function renderMonthChart(data) {
    if (!$('#monthChart').length) return;
    
    monthChart = echarts.init(document.getElementById('monthChart'));
    
    data.reverse();
    
    var months = data.map(function(d) { return d.year + '年' + d.month + '月'; });
    var counts = data.map(function(d) { return d.count; });
    
    var option = {
        tooltip: { trigger: 'axis', formatter: function(params) { return params[0].name + '<br/>订单数: ' + params[0].value; } },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: months, axisLabel: { rotate: 45 } },
        yAxis: { type: 'value', name: '订单数' },
        series: [{ name: '订单数', type: 'bar', data: counts, itemStyle: { color: '#5470c6' } }]
    };
    
    monthChart.setOption(option);
}

function renderYearChart(data) {
    if (!$('#yearChart').length) return;
    
    yearChart = echarts.init(document.getElementById('yearChart'));
    
    var years = data.map(function(d) { return d.year + '年'; });
    var counts = data.map(function(d) { return d.count; });
    var 同比s = data.map(function(d) { return d.同比; });
    
    var option = {
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        legend: { data: ['订单数', '同比(%)'] },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: years },
        yAxis: [
            { type: 'value', name: '订单数' },
            { type: 'value', name: '同比(%)' }
        ],
        series: [
            { name: '订单数', type: 'bar', data: counts, itemStyle: { color: '#5470c6' } },
            { name: '同比(%)', type: 'line', yAxisIndex: 1, data: 同比s, itemStyle: { color: '#fac858' } }
        ]
    };
    
    yearChart.setOption(option);
    
    window.addEventListener('resize', function() {
        if (monthChart) monthChart.resize();
        if (yearChart) yearChart.resize();
    });
}
</script>
{% endblock %}
