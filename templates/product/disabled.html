{% extends "base.html" %}

{% block title %}停用产品列表 - 客户管理系统{% endblock %}

{% block content %}
<div class="content-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0">
        <i class="bi bi-pause-circle me-2"></i>产品管理
    </h4>
    <div>
        <a href="/product/" class="btn btn-outline-secondary btn-sm me-2">
            <i class="bi bi-list-ul"></i> 产品列表
        </a>
        <a href="/product/group" class="btn btn-outline-info btn-sm me-2">
            <i class="bi bi-collection"></i> 分类组
        </a>
        <a href="/product/category" class="btn btn-outline-info btn-sm">
            <i class="bi bi-tags"></i> 产品分类
        </a>
        <span class="badge bg-warning text-dark ms-2">停用列表</span>
    </div>
</div>

<div class="table-card">
    <div class="p-3 border-bottom">
        <div class="row g-3 align-items-center">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchInput" placeholder="搜索产品名称..." oninput="searchByKeyword()">
            </div>
        </div>
    </div>
    
    <div class="table-responsive p-3">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>产品名称</th>
                    <th>分类</th>
                    <th>宽</th>
                    <th>高</th>
                    <th>单价</th>
                    <th>单位</th>
                    <th>销售状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="10" class="text-center text-muted py-4">
                        <i class="bi bi-hourglass-split"></i> 加载中...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="p-3 border-top">
        <div class="d-flex justify-content-between align-items-center">
            <div class="text-muted">共 <span id="totalCount">0</span> 条记录</div>
            <nav>
                <ul class="pagination mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
let currentStatus = 0;

// 模糊搜索
function searchByKeyword() {
    loadData(1);
}

// 加载数据
function loadData(page = 1) {
    currentPage = page;
    const search = $('#searchInput').val();
    
    $.get('/product/api/list', {
        status: currentStatus,
        page: page,
        limit: 12,
        search: search
    }, function(res) {
        if (res.code === 0) {
            renderTable(res.data);
            renderPagination(res.count, page);
            $('#totalCount').text(res.count);
        }
    });
}

// 渲染表格
function renderTable(data) {
    if (data.length === 0) {
        $('#tableBody').html('<tr><td colspan="10" class="text-center text-muted py-4">暂无停用产品</td></tr>');
        return;
    }
    
    let html = '';
    data.forEach(item => {
        let salesStatusHtml = item.sales_status === 1 
            ? '<span class="badge bg-success">在售</span>' 
            : '<span class="badge bg-secondary">停售</span>';
        
        // 渲染分类显示
        let categoryHtml = item.category_display && item.category_display.length > 0 
            ? item.category_display.map(c => `<div>${c.group_name}: ${c.category_name || '-'}</div>`).join('')
            : '-';
        
        html += `
        <tr>
            <td>${item.id}</td>
            <td><strong>${item.product_name}</strong></td>
            <td>${categoryHtml}</td>
            <td>${item.width || '-'}</td>
            <td>${item.height || '-'}</td>
            <td>¥${item.price.toFixed(2)}</td>
            <td>${item.unit || '-'}</td>
            <td>${salesStatusHtml}</td>
            <td>${item.created_at}</td>
            <td>
                <button class="btn btn-sm btn-outline-success me-1" onclick="toggleStatus(${item.id}, 1)">
                    <i class="bi bi-play-circle"></i> 启用
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${item.id})">
                    <i class="bi bi-trash"></i> 删除
                </button>
            </td>
        </tr>`;
    });
    $('#tableBody').html(html);
}

// 渲染分页
function renderPagination(total, page) {
    const totalPages = Math.ceil(total / 12);
    if (totalPages <= 1) {
        $('#pagination').html('');
        return;
    }
    
    let html = '';
    html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" data-page="${page - 1}">上一页</a>
    </li>`;
    
    for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}">
            <a class="page-link" href="javascript:void(0)" data-page="${i}">${i}</a>
        </li>`;
    }
    
    html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" data-page="${page + 1}">下一页</a>
    </li>`;
    
    $('#pagination').html(html);
    
    // 绑定分页点击事件
    $('#pagination .page-link').on('click', function(e) {
        e.preventDefault();
        const p = $(this).data('page');
        if (p && p > 0) {
            loadData(p);
        }
    });
}

// 切换状态
function toggleStatus(id, status) {
    if (!confirm(status === 1 ? '确定要启用该产品吗？' : '确定要停用该产品吗？')) return;
    
    $.ajax({
        url: `/product/api/toggle_status/${id}`,
        type: 'POST',
        success: function(res) {
            if (res.code === 0) {
                loadData(currentPage);
                alert('操作成功');
            } else {
                alert(res.msg);
            }
        }
    });
}

// 删除产品
function deleteProduct(id) {
    if (!confirm('确定要删除该产品吗？此操作不可恢复！')) return;
    
    $.ajax({
        url: `/product/api/delete/${id}`,
        type: 'POST',
        success: function(res) {
            if (res.code === 0) {
                loadData(currentPage);
                alert('删除成功');
            } else {
                alert(res.msg);
            }
        }
    });
}

// 页面加载
$(function() {
    loadData();
});
</script>
{% endblock %}
